<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CPP Park & Ride - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="top-bar">
    <a href="home.html" class="logo">CPP Park & Ride</a>
</header>

<main class="centered">
    <h1>Welcome! Please Sign In with Your CPP Account</h1>

    <form id="loginForm" class="login-form">
        <label>Email</label>
        <input type="email" placeholder="yourname@cpp.edu" required>

        <label>Password</label>
        <input type="password" placeholder="********" required>

        <button type="submit">Login</button>
    </form>
</main>

<script src="script.js"></script>
</body>
</html>
