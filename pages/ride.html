<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easy Parking - Rides</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="top-bar">
    <a href="home.html" class="logo">CPP Park & Ride</a>
    <a href="myaccount.html" class="account-btn">My Account</a>
</header>

<main class="page-container">
    <div class="page-header">
        <button class="back-btn" onclick="goBack()">Go Back</button>
        <a class="page-title">Give or Request a Ride</a>
    </div>

    <div class="ride-page-content">
        <div class="ride-sections">

            <div class="ride-card">
                <img src="images/fromhometoschool.jpg" alt="Map showing rides from home to school" class="ride-map-image">
                <button class="ride-action-btn request-ride-btn" onclick="requestRide()">Request Ride to School</button>
                <a href="giveride.html?to=school" class="ride-action-btn give-ride-btn">Give a Ride to School</a>
            </div>

            <div class="ride-card">
                <img src="images/fromschooltohome.jpg" alt="Map showing rides from school to home" class="ride-map-image">
                <button class="ride-action-btn request-ride-btn" onclick="requestRide()">Request Ride to Home</button>
                <a href="giveride.html?to=home" class="ride-action-btn give-ride-btn">Give a Ride to Home</a>
            </div>

        </div>

    </div>

</main>

<script>
function goBack() {
    window.location.href = "home.html";
}

function requestRide() {
    alert("Request successful! Connecting you to chat.");
    window.location.href = "chat.html";
}
</script>

</body>
</html>
