<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easy Parking - Parking</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="top-bar">
    <a href="home.html" class="logo">CPP Park & Ride</a>
    <a href="myaccount.html" class="account-btn">My Account</a>
</header>

<main class="page-container centered">
    <div class="page-header">
        <button class="back-btn" onclick="goBack()">Go Back</button>
        <a class="page-title">Campus Parking Maps and Spaces</a>
    </div>

    <div class="parking-box">
        <div id="parkingImageDisplay" class="parking-image-display">
            <img id="parkingImage" class="parking-map-image" src="" alt="">
            <div class="parking-details">
                <div class="parking-legend" aria-label="Filled parking space legend">
                    <span class="filled-space-dot"></span>
                    <span>= Filled Parking Space</span>
                </div>
                <p id="parkingInfoText" class="parking-info-text"></p>
            </div>
        </div>

        <label for="parkingSelect">Select a parking lot/structure</label>

        <select id="parkingSelect" class="real-dropdown">
            <option value="">-- Choose a location --</option>
            <option value="images/overflowparkinglot.png">Overflow Parking Lot</option>
            <option value="images/overflowparkinglotunpaved.png">Overflow Parking Lot (Unpaved)</option>
            <option value="images/parkinglotb.png">Parking Lot B</option>
            <option value="images/parkinglotj.png">Parking Lot J</option>
            <option value="images/parkinglotk.png">Parking Lot K</option>
            <option value="images/parkinglotm.png">Parking Lot M</option>
            <option value="images/parkinglotr.png">Parking Lot R</option>
            <option value="images/parkinglott.png">Parking Lot T</option>
            <option value="images/parkinglotu.png">Parking Lot U</option>
            <option value="images/parkingstructure1.png">Parking Structure 1</option>
            <option value="images/parkingstructure2.png">Parking Structure 2</option>
        </select>

    </div>

</main>

<script>
function goBack() {
    window.location.href = "home.html";
}

const parkingSelect = document.getElementById("parkingSelect");
const parkingImage = document.getElementById("parkingImage");
const parkingImageDisplay = document.getElementById("parkingImageDisplay");
const parkingInfoText = document.getElementById("parkingInfoText");

const parkingInfoByImage = {
    "images/overflowparkinglot.png": "This lot is closest to: University Village",
    "images/overflowparkinglotunpaved.png": "This lot is closest to: University Village",
    "images/parkinglotb.png": "This lot is closest to: University Village, Residence Suites, Kellog Arena, and English Language Institute",
    "images/parkinglotj.png": "This lot is closest to: Health Services, College of Environmental Design, College of Agriculture, BioTrek Learning Center, and College of Science",
    "images/parkinglotk.png": "This lot is closest to: University Village, Residence Suites, Kellog Arena, and English Language Institute",
    "images/parkinglotm.png": "This lot is closest to: Health Services, College of Environmental Design, College of Agriculture, BioTrek Learning Center, and College of Science",
    "images/parkinglotr.png": "This lot is closest to: Kellogg House Pomona",
    "images/parkinglott.png": "This lot is closest to: Interim Design Center",
    "images/parkinglotu.png": "This lot is closest to: University Village",
    "images/parkingstructure1.png": "This lot is closest to: College of Business Administration, Classroom/Laboratory/Administration, and College of Engineering",
    "images/parkingstructure2.png": "This lot is closest to: tennis Tennis Courts, BRIC, and Bronco Bookstore"
};

parkingSelect.addEventListener("change", function() {
    const imageFile = parkingSelect.value;

    if (!imageFile) {
        parkingImage.removeAttribute("src");
        parkingImage.alt = "";
        parkingInfoText.textContent = "";
        parkingImageDisplay.classList.remove("is-visible");
        return;
    }

    parkingImage.src = imageFile;
    parkingImage.alt = `${parkingSelect.options[parkingSelect.selectedIndex].text} map`;
    parkingInfoText.textContent = parkingInfoByImage[imageFile] || "";
    parkingImageDisplay.classList.add("is-visible");
});

parkingImage.addEventListener("error", function() {
    parkingImage.removeAttribute("src");
    parkingImage.alt = "";
    parkingInfoText.textContent = "";
    parkingImageDisplay.classList.remove("is-visible");
});
</script>

</body>
</html>
